<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio Player</title>
    <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #171b1f;
        color: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .player {
        width: min(100%, 760px);
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 4vw, 2rem);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #cbd2d6;
      }

      audio {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <section class="player" aria-label="Interner Audio Player">
      <h1 id="title">Audio</h1>
      <p>Interne Audiodatei</p>
      <audio id="audio" controls preload="metadata"></audio>
    </section>
    <script>
      const params = new URLSearchParams(window.location.search);
      const src = params.get("audio");
      const title = params.get("title") || "Audio";
      document.getElementById("title").textContent = title;
      if (src) {
        document.getElementById("audio").src = src;
      }
    </script>
  </body>
</html>
